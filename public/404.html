<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>9ronTactics</title>
    <script>
      // GitHub Pages SPA redirect: encode path as query param and send to index.html
      // pathSegmentsToKeep=1 to preserve /9ronTactics/ base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
